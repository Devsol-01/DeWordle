# ──────────────────────────────────────────────────────────────────────────────
# DeWordle local infrastructure stack
#
# Startup profiles
# ─────────────────────────────────────────────────────────────
#   (no profile)                               Postgres only
#   --profile backend                          Postgres + NestJS API
#   --profile rpc-proxy                        Postgres + Soroban RPC proxy
#   --profile backend --profile rpc-proxy      All three services
#
# Quick start
# ─────────────────────────────────────────────────────────────
#   docker compose up                              # postgres only
#   docker compose --profile backend up --build   # postgres + API
#   docker compose --profile rpc-proxy up          # postgres + proxy
#
# From the project root you can also use the helper script:
#   ./scripts/infra-up.sh [postgres|backend|proxy|full|down]
#
# See docs/LOCAL_INFRA_STACK.md for full documentation.
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Postgres ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: dewordle_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dewordledb
      POSTGRES_USER: dewordledb_owner
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dewordledb_owner"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS backend API ─────────────────────────────────────────────────────
  # Profile: backend
  #
  # Environment resolution order (last wins):
  #   1. Defaults set here (safe for local dev)
  #   2. .env file (optional, not required)
  #   3. .env.development file (optional, not required)
  #
  # Required vars not defaulted here — supply them in .env or via the shell:
  #   JWT_SECRET                     Auth signing secret (never use the
  #                                  default in any shared environment)
  #   SOROBAN_CORE_GAME_CONTRACT_ID  Set to "placeholder" if no contract is
  #                                  deployed yet; indexer polls silently
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dewordle_backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
      - path: .env.development
        required: false
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USERNAME: dewordledb_owner
      DB_PASSWORD: password
      DB_NAME: dewordledb
      DB_SSL: 'false'
      PORT: '3000'
      # These can be overridden via .env or shell env vars.
      # The placeholder contract ID keeps the indexer quiet but lets the
      # rest of the API start without errors.
      SOROBAN_RPC_URL: '${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}'
      SOROBAN_NETWORK: '${SOROBAN_NETWORK:-testnet}'
      SOROBAN_CORE_GAME_CONTRACT_ID: '${SOROBAN_CORE_GAME_CONTRACT_ID:-placeholder}'
      JWT_SECRET: '${JWT_SECRET:-local-dev-insecure-secret-do-not-use-in-production}'
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [backend]

  # ── Soroban RPC caching proxy ──────────────────────────────────────────────
  # Profile: rpc-proxy
  #
  # Proxies JSON-RPC requests to an upstream Soroban node and caches read-only
  # responses. Useful when running repeated indexer replays or integration tests
  # that would otherwise hammer the testnet rate limit.
  #
  # To point the backend at the proxy instead of testnet, set:
  #   SOROBAN_RPC_URL=http://rpc-proxy:7545   (inside docker network)
  #   SOROBAN_RPC_URL=http://localhost:7545    (from host)
  rpc-proxy:
    image: node:20-alpine
    container_name: dewordle_rpc_proxy
    restart: unless-stopped
    command: node /scripts/rpc-proxy.js
    volumes:
      - ../scripts/rpc-proxy.js:/scripts/rpc-proxy.js:ro
    environment:
      RPC_PROXY_PORT: '7545'
      SOROBAN_RPC_URL: '${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}'
      RPC_CACHE_TTL_MS: '${RPC_CACHE_TTL_MS:-30000}'
    ports:
      - '7545:7545'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7545/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    profiles: [rpc-proxy]

volumes:
  postgres_data:
