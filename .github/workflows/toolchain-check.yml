name: Toolchain Matrix Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: ./.github/actions/setup-node

  check-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Report Rust version
        run: rustc --version
